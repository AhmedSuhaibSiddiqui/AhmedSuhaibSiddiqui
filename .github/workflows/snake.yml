# ════════════════════════════════════════════════════════════════════════════
#  Contribution Snake Generator
#  Save this file at:  .github/workflows/snake.yml   (in your profile repo)
#  It regenerates the snake SVG every 12 hours and on every push to main.
# ════════════════════════════════════════════════════════════════════════════
name: Generate Snake Animation

on:
  schedule:
    # Runs at minute 0 every 12 hours (00:00 and 12:00 UTC)
    - cron: "0 */12 * * *"
  push:
    branches:
      - main
  workflow_dispatch: # lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs (light + dark)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#f37021

      - name: Push to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
